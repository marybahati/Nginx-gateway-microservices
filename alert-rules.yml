groups:
  - name: service_alerts
    rules:
      - alert: ServiceDown
        expr: up{job=~"service-a|service-b|service-c"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Prometheus cannot scrape {{ $labels.job }}. Check container health and logs."

      - alert: HighErrorRate
        expr: |
          sum by (service) (rate(http_errors_total[2m])) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "More than 0.1 errors/sec over the last 2 minutes."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum by (service, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.service }}"
          description: "p95 request latency is above 500ms for 2 minutes."
