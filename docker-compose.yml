services:
  service-b:
    image: nginx-gateway-microservices-service-b:local
    build:
      context: .
      dockerfile: services/service-b/Dockerfile
    user: "node"
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_C_URL: http://service-c:3003
      SERVICE_C_HEALTH_URL: http://service-c:3003/health
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SERVICE_VERSION: local
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3002/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - private

  service-c:
    image: nginx-gateway-microservices-service-c:local
    build:
      context: .
      dockerfile: services/service-c/Dockerfile
    user: "node"
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_A_CALLBACK_URL: http://service-a:3001
      SERVICE_A_HEALTH_URL: http://service-a:3001/health
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SERVICE_VERSION: local
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3003/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - private

  service-a:
    image: nginx-gateway-microservices-service-a:local
    build:
      context: .
      dockerfile: services/service-a/Dockerfile
    user: "node"
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_B_URL: http://service-b:3002
      SERVICE_B_HEALTH_URL: http://service-b:3002/health
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      SERVICE_VERSION: local
    depends_on:
      service-b:
        condition: service_healthy
      service-c:
        condition: service_healthy
    init: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - private

  nginx:
    image: nginxinc/nginx-unprivileged:1.27.5-alpine
    user: "101:101"
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      service-a:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:8080/service-a/health || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - public
      - private

  prometheus:
    image: prom/prometheus:v2.53.0
    user: "nobody"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - public
      - private

  grafana:
    image: grafana/grafana:11.1.0
    user: "472"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3030:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    networks:
      - public
      - private

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4318:4318"
    restart: unless-stopped
    networks:
      - public
      - private

  loki:
    image: grafana/loki:3.0.0
    user: "10001"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    networks:
      - public
      - private

  promtail:
    image: grafana/promtail:3.0.0
    user: root
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    networks:
      - private

networks:
  public:
    driver: bridge
  private:
    driver: bridge
    internal: true

volumes:
  prometheus-data:
  loki-data:
