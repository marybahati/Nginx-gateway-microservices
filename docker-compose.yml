services:
  service-b:
    build:
      context: .
      dockerfile: services/service-b/Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_C_URL: http://service-c:3003
    restart: unless-stopped
    networks:
      - gateway

  service-c:
    build:
      context: .
      dockerfile: services/service-c/Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_A_CALLBACK_URL: http://service-a:3001
    restart: unless-stopped
    networks:
      - gateway

  service-a:
    build:
      context: .
      dockerfile: services/service-a/Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
      SERVICE_B_URL: http://service-b:3002
      SERVICE_B_HEALTH_URL: http://service-b:3002/health
      SERVICE_C_HEALTH_URL: http://service-c:3003/health
    depends_on:
      service-b:
        condition: service_started
      service-c:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - gateway

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      service-a:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gateway

networks:
  gateway:
    driver: bridge
