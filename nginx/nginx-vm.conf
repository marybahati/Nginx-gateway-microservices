# Installed to /etc/nginx/sites-available/nginx-gateway-microservices

upstream service_a {
    server service-a.internal:3001;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    access_log /var/log/nginx/nginx-gateway-access.log json_access;
    error_log /var/log/nginx/error.log warn;

    # Only Service A is exposed through Nginx
    location /service-a/ {
        proxy_pass http://service_a/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-ID $req_id;
    }

    location / {
        return 404;
    }
}
