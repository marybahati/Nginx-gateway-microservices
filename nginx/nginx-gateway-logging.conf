# Installed to /etc/nginx/conf.d/nginx-gateway-logging.conf
# map and log_format must live in the http{} context.

map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

map $upstream_addr $upstream_label {
    default $upstream_addr;
    "127.0.0.1:3001" "service-a:3001";
}

log_format json_access escape=json
  '{'
    '"timestamp":"$time_iso8601",'
    '"request_id":"$req_id",'
    '"method":"$request_method",'
    '"path":"$uri",'
    '"status":$status,'
    '"upstream":"$upstream_label",'
    '"request_time":$request_time'
  '}';
