name: Verify

# PR / main gate only. Does NOT publish images or deploy to AWS.
# Deploy path: merge to main → CodeConnections → CodePipeline → CodeBuild
#   (buildspecs/service-*.yml) → ECR → ECS via imagedefinitions.json.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: "20"

jobs:
  verify:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: service-a
            path: ./services/service-a
          - service: service-b
            path: ./services/service-b
          - service: service-c
            path: ./services/service-c

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: npm test

      - name: Build application
        working-directory: ${{ matrix.path }}
        run: npm run build --if-present

  verify-compose:
    name: Local Compose smoke (nginx gateway)
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config

      - name: Build and start Compose stack
        run: docker compose up -d --build --wait

      - name: Show running services
        run: docker compose ps

      - name: Check local gateway health
        run: curl --fail --silent --show-error http://localhost:8080/service-a/health | python3 -m json.tool

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v
